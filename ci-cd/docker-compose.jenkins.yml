# Used to locally spin up a Jenkins Server for CI/CD Pipeline testing

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    user: root
    ports:
      - "8080:8080" # Jenkins Web Interface
      - "50000:50000" # JNLP agents port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount the Docker socket so Jenkins can build Docker images & run docker-compose
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devops_lab_net

volumes:
  jenkins_home:

networks:
  devops_lab_net:
    # Use the existing network created by the main docker-compose.yml
    name: devops_devops_lab_net
    external: true
